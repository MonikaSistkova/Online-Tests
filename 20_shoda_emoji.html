<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Shoda podmětu s přísudkem - Rychlotest</title>
    <style>
        :root {
            --primary: #4834d4;
            --success: #2ecc71;
            --error: #ff4757;
            --bg: #f0f2f5;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 30px 15px; }
        .container { max-width: 750px; margin: 0 auto; background: white; padding: 35px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; font-size: 2.2em; }
        .subtitle { text-align: center; color: #636e72; margin-bottom: 35px; }

        .item { 
            margin-bottom: 15px; padding: 18px; border-radius: 15px; 
            background: #fff; border: 2px solid #edeff2; 
            transition: all 0.3s ease; 
        }
        .sentence { font-size: 1.15em; font-weight: 500; display: flex; align-items: center; flex-wrap: wrap; }
        
        input { 
            width: 40px; height: 40px; text-align: center; font-size: 22px; font-weight: bold; 
            border: 3px solid #dcdde1; border-radius: 10px; margin: 0 10px; 
            transition: all 0.2s; outline: none;
        }

        .feedback-box { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out;
            font-size: 0.95em; line-height: 1.5; margin-top: 0;
        }
        .show-feedback { max-height: 150px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #eee; }

        .msg { font-weight: 800; display: block; margin-bottom: 3px; text-transform: uppercase; font-size: 0.85em; }
        
        /* Barvy pro stavy */
        .input-success { border-color: var(--success) !important; background: #e3fcef; color: #0e6245; }
        .input-error { border-color: var(--error) !important; background: #fff2f2; color: #a80000; }
        .text-success { color: #1e7e34; }
        .text-error { color: #c0392b; }

        .emoji { font-size: 1.4em; margin-right: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Shoda podmětu s přísudkem</h1>
    <p class="subtitle">Stačí vepsat <b>i / y / a</b> a hned uvidíš, jak jsi na tom! 🚀</p>

    <div id="quiz"></div>
</div>

<script>
const data = [
    { s: "Sněhuláci na zahradě roztál", a: "i", e: "⛄", v: "Sněhuláci jsou životní (ti sněhuláci)." },
    { s: "Všechny moje mobily se rozbil", a: "y", e: "📱", v: "Mobil je neživotný (ty hrady)." },
    { s: "Rodiče na nás dlouho čekal", a: "i", e: "👪", v: "Rodiče jsou vždy mužský rod životný." },
    { s: "Děvčata venku vesele běhal", a: "a", e: "👧", v: "Děvče je střední rod (ta města)." },
    { s: "Housle v orchestru krásně hral", a: "y", e: "🎻", v: "Housle jsou pomnožné, rod ženský." },
    { s: "Davy lidí se v metru tlačil", a: "y", e: "🚶", v: "Podmětem je 'dav' (ty hrady)." },
    { s: "Děti si na písku hrál", a: "y", e: "⚽", v: "Dítě v mn. č. je rod ženský (ty děti)." },
    { s: "Dřevěné kozy na řezání se polámal", a: "y", e: "🪵", v: "Kozy jako nástroje jsou neživotné." },
    { s: "Dny plné slunce už skončil", a: "y", e: "📅", v: "Dny jsou rod mužský neživotný." },
    { s: "Učitelé i žáci už odešl", a: "i", e: "🏫", v: "Mužský životný rod má vždy přednost." },
    { s: "Oči mě z toho koukání bolel", a: "y", e: "👁️", v: "Oči, uši, ruce, nohy = v mn. č. vždy -y." },
    { s: "Koně se na louce pásl", a: "i", e: "🐎", v: "Kůň je rod mužský životný." },
    { s: "Květiny ve váze rychle uvadl", a: "y", e: "💐", v: "Květiny jsou rod ženský." },
    { s: "Stroje v továrně hlučel", a: "y", e: "⚙️", v: "Stroje jsou neživotné (ty stroje)." },
    { s: "Výletní lodě se pohupoval", a: "y", e: "🛳️", v: "Loď je rod ženský (vzor píseň)." },
    { s: "Housata se v trávě schoval", a: "a", e: "🐤", v: "Housata jsou rod střední (ta kuřata)." },
    { s: "Mračna na nebi nadobro zmizel", a: "a", e: "☁️", v: "Mračna jsou rod střední (ta města)." },
    { s: "Sousedovy kočky se popral", a: "y", e: "🐈", v: "Kočky jsou rod ženský." },
    { s: "Stohy slámy na poli shořel", a: "y", e: "🔥", v: "Podmětem jsou 'stohy' (ty hrady)." },
    { s: "Tisíce diváků v aréně jásal", a: "y", e: "🏟️", v: "Podmětem je slovo 'tisíce' (ty hrady)." }
];

const posCorrect = ["Výborně! Jsi jednička! 🌟", "Skvělá práce, jen tak dál! 🚀", "Jasná trefa! 🎯", "Jde ti to fantasticky! 🔥"];
const posWrong = ["Nevadí, to byl těžký chyták! 🌱", "Klid, příště to dáš! 💪", "Skoro, zkus nad tím ještě mrknout. 🧐", "Žádný stres, učíme se! ✨"];

const container = document.getElementById('quiz');

data.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
        <div class="sentence">
            <span class="emoji">${item.e}</span>
            <span>${item.s}</span>
            <input type="text" id="in-${index}" maxlength="1" oninput="validate(${index})">.
        </div>
        <div id="fb-${index}" class="feedback-box"></div>
    `;
    container.appendChild(div);
});

function validate(idx) {
    const input = document.getElementById(`in-${idx}`);
    const fb = document.getElementById(`fb-${idx}`);
    const val = input.value.toLowerCase().trim();
    
    if (val === "") {
        fb.classList.remove('show-feedback');
        input.className = "";
        return;
    }

    fb.classList.add('show-feedback');

    if (val === data[idx].a) {
        const m = posCorrect[Math.floor(Math.random() * posCorrect.length)];
        input.className = "input-success";
        fb.innerHTML = `<span class="msg text-success">✅ ${m}</span> ${data[idx].v}`;
    } else {
        const m = posWrong[Math.floor(Math.random() * posWrong.length)];
        input.className = "input-error";
        fb.innerHTML = `<span class="msg text-error">❌ ${m}</span> Správně je <b>-${data[idx].a}</b>. ${data[idx].v}`;
    }
}
</script>

</body>
</html>
