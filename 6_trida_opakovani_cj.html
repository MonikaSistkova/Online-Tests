<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Čeština: 50 Hard Otázek</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #fbc02d; /* Sytě žlutá */
        --bg: #fffde7;      /* Světle žluté pozadí */
        --dark: #455a64;    /* Tmavě šedá pro text */
        --correct: #43a047;
        --wrong: #d32f2f;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--dark);padding:2rem 1rem;line-height:1.6}
    .container{max-width:800px;margin:0 auto}
    header{text-align:center;margin-bottom:3rem;background:var(--primary);padding:2rem;border-radius:20px;box-shadow:0 10px 20px rgba(0,0,0,0.1)}
    h1{font-size:2.5rem;color:#333;text-transform:uppercase}
    .progress-bar{position:sticky;top:10px;z-index:100;background:white;padding:15px;border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1);margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;border:2px solid var(--primary)}
    .q-card{background:white;border-radius:18px;padding:1.5rem;margin-bottom:1.5rem;border-left:8px solid var(--primary);box-shadow:0 4px 15px rgba(0,0,0,0.05)}
    .q-topic{font-size:0.7rem;color:#999;font-weight:800;text-transform:uppercase;margin-bottom:0.5rem;letter-spacing:1px}
    .q-text{font-size:1.1rem;font-weight:600;margin-bottom:1.2rem;color:#2c3e50}
    .options{display:grid;gap:10px}
    .opt-btn{background:#fff9c4;border:2px solid #fff176;padding:12px 16px;border-radius:10px;color:#333;text-align:left;cursor:pointer;font-weight:600;transition:0.2s;font-family:inherit}
    .opt-btn:hover:not(:disabled){background:var(--primary);border-color:#f9a825}
    .opt-btn.correct{background:var(--correct) !important;color:white;border-color:#2e7d32}
    .opt-btn.wrong{background:var(--wrong) !important;color:white;border-color:#b71c1c}
    .feedback{margin-top:1rem;padding:1rem;border-radius:10px;display:none;font-size:0.9rem;background:#f5f5f5;border-left:4px solid #ccc}
    .feedback.show{display:block}
    .main-btn{display:block;width:100%;padding:1.2rem;background:#f9a825;color:white;border:none;border-radius:15px;font-weight:800;font-size:1.3rem;cursor:pointer;margin-top:2rem;box-shadow:0 6px 0 #e65100;transition:all 0.1s}
    .main-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #e65100}
    #summary{display:none;text-align:center;margin-top:3rem;padding:3rem;background:white;border-radius:25px;border:5px solid var(--primary)}
    .score-num{font-size:5rem;font-weight:900;color:var(--primary)}
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>🏆 Mega Test Čestiny</h1>
        <p>50 otázek | Verze HARD | Žlutá Edice</p>
    </header>

    <div class="progress-bar">
        <span id="progText">Zodpovězeno: 0 / 50</span>
        <span id="scoreText">Body: 0</span>
    </div>

    <div id="quizBox"></div>

    <button class="main-btn" onclick="showFinal()">VYHODNOTIT CELÝ MARATON</button>

    <div id="summary">
        <h2>Výsledek tvého snažení:</h2>
        <div class="score-num" id="finalScore">0/50</div>
        <p id="finalMsg" style="font-size:1.2rem; margin:1rem 0; font-weight:600;"></p>
        <button class="main-btn" onclick="location.reload()">Zkusit znovu</button>
    </div>
</div>

<script>
// Data testu (50 otázek)
const Q = [
    // 1-10: i/y a shoda
    {t:"Příčestí", s:"Děti si na hřišti vesele ___.", o:["hráli","hrály"], c:1, why:"Děti = rod ženský (v mn. č.), proto -y."},
    {t:"Příčestí", s:"Davy lidí se ___ k budově.", o:["hrnuli","hrnuly"], c:1, why:"Podmět jsou davy (mužský neživotný) -> -y."},
    {t:"Příčestí", s:"Králové i poddaní ___ společně.", o:["večeřeli","večeřely"], c:0, why:"Králové = mužský životný -> -i."},
    {t:"Příčestí", s:"Mrazy v noci ___.", o:["udeřili","udeřily"], c:1, why:"Mrazy = mužský neživotný -> -y."},
    {t:"Příčestí", s:"Děvčata a selata se ___ na slunci.", o:["vyhřívali","vyhřívaly","vyhřívala"], c:2, why:"Ženský + Střední rod v mn. č. -> -a."},
    {t:"Příčestí", s:"Rodiče ___ do kina.", o:["odešli","odešly"], c:0, why:"Rodiče jsou vždy mužský životný -> -i."},
    {t:"Příčestí", s:"Skupiny turistů ___ na vrchol.", o:["dorazili","dorazily"], c:1, why:"Podmět jsou skupiny (ženský rod) -> -y."},
    {t:"Příčestí", s:"Dni rychle ___.", o:["ubíhali","ubíhaly"], c:1, why:"Dni/Dny = mužský neživotný -> -y."},
    {t:"Příčestí", s:"Oči ___ jako hvězdy.", o:["zářili","zářily"], c:1, why:"Oči, uši, nohy (pokud jsou párové) mají v mn. č. koncovku -y."},
    {t:"Příčestí", s:"Uličníci se ___ trestu.", o:["polekali","polekaly"], c:0, why:"Uličníci = mužský životný -> -i."},

    // 11-20: Mě/Mně
    {t:"Mě/Mně", s:"Viděl ___ na ulici.", o:["mě","mně"], c:0, why:"4. pád (koho?) -> mě (tě)."},
    {t:"Mě/Mně", s:"Podej ___ tu knihu.", o:["mě","mně"], c:1, why:"3. pád (komu?) -> mně (tobě)."},
    {t:"Mě/Mně", s:"Mluvili o ___ beze mě.", o:["mě","mně"], c:1, why:"6. pád (o kom?) -> mně (o tobě)."},
    {t:"Mě/Mně", s:"Bál se o ___.", o:["mě","mně"], c:0, why:"4. pád (o koho?) -> mě (tě)."},
    {t:"Mě/Mně", s:"K ___ se nikdo nepřidal.", o:["mě","mně"], c:1, why:"3. pád po předložce 'k' -> mně."},
    {t:"Mě/Mně", s:"Vzpomeň si na ___.", o:["mě","mně"], c:0, why:"4. pád (na koho?) -> mě (tě)."},
    {t:"Mě/Mně", s:"Při ___ stálo štěstí.", o:["mě","mně"], c:1, why:"6. pád (při kom?) -> mně (při tobě)."},
    {t:"Mě/Mně", s:"Bez ___ tam nechoď.", o:["mě","mně"], c:0, why:"2. pád (bez koho?) -> mě (tě)."},
    {t:"Mě/Mně", s:"Věříš ___?", o:["mě","mně"], c:1, why:"3. pád (komu?) -> mně (tobě)."},
    {t:"Mě/Mně", s:"Slyšíš ___ dobře?", o:["mě","mně"], c:0, why:"4. pád (koho?) -> mě (tě)."},

    // 21-30: Zájmena
    {t:"Zájmena", s:"Které zájmeno je ZÁPORNÉ?", o:["někdo","nikdo","každý"], c:1, why:"Záporná: nikdo, nic, nijaký, žádný."},
    {t:"Zájmena", s:"Druh zájmena: NÁŠ.", o:["osobní","přivlastňovací","ukazovací"], c:1, why:"Náš, váš, můj -> přivlastňovací."},
    {t:"Zájmena", s:"Druh zájmena: TENTO.", o:["ukazovací","vztažné","neurčité"], c:0, why:"Tento, ten, onen -> ukazovací."},
    {t:"Zájmena", s:"Druh zájmena: KDO (v otázce).", o:["tázací","vztažné","neurčité"], c:0, why:"V otázce je kdo/co zájmeno tázací."},
    {t:"Zájmena", s:"Druh zájmena: KTERÝ (spojuje věty).", o:["ukazovací","vztažné","tázací"], c:1, why:"Pokud spojuje věty, je vztažné."},
    {t:"Zájmena", s:"Druh zájmena: SE/SI.", o:["osobní","vztažné","zvratné"], c:2, why:"Se, si, sebe jsou zájmena zvratná."},
    {t:"Zájmena", s:"Druh zájmena: NĚCO.", o:["neurčité","záporné","osobní"], c:0, why:"Ně-co, ně-kdo -> neurčité."},
    {t:"Zájmena", s:"Druh zájmena: JÁ.", o:["osobní","ukazovací","tázací"], c:0, why:"Já, ty, on... jsou osobní."},
    {t:"Zájmena", s:"Druh zájmena: VŠECHNO.", o:["neurčité","ukazovací","přivlastňovací"], c:0, why:"Všechen, každý, některý -> neurčitá."},
    {t:"Zájmena", s:"Druh zájmena: JEHO.", o:["přivlastňovací","osobní","oba"], c:2, why:"Může být osobní (vidím jeho) i přivlastňovací (jeho pes)."},

    // 31-40: Číslovky
    {t:"Číslovky", s:"Druh: PÁTÝ.", o:["základní","řadová","druhová"], c:1, why:"Pořadí (kolikátý?) -> řadová."},
    {t:"Číslovky", s:"Druh: DVOJÍ.", o:["základní","násobná","druhová"], c:2, why:"Počet druhů -> druhová."},
    {t:"Číslovky", s:"Druh: STO.", o:["základní","řadová","násobná"], c:0, why:"Počet (kolik?) -> základní."},
    {t:"Číslovky", s:"Druh: TŘIKRÁT.", o:["řadová","násobná","druhová"], c:1, why:"Kolikrát? -> násobná."},
    {t:"Číslovky", s:"Druh: MÁLO.", o:["číslovka neurčitá","příslovce","oboje"], c:2, why:"V mluvnici 6. tř. je to číslovka základní neurčitá."},
    {t:"Číslovky", s:"Druh: DESATERO.", o:["základní","druhová","řadová"], c:1, why:"Desatero, čtvero -> druhová."},
    {t:"Číslovky", s:"Druh: JEDNA.", o:["základní","řadová","násobná"], c:0, why:"Základní."},
    {t:"Číslovky", s:"Druh: MILIONTÝ.", o:["základní","řadová","násobná"], c:1, why:"Řadová."},
    {t:"Číslovky", s:"Druh: DVAKRÁT.", o:["násobná","druhová","řadová"], c:0, why:"Násobná."},
    {t:"Číslovky", s:"Druh: NĚKOLIK.", o:["základní určitá","základní neurčitá","řadová"], c:1, why:"Základní neurčitá."},

    // 41-50: Větné členy (PUZ, PUM, PUČ)
    {t:"Větné členy", s:"Pracoval (v lese).", o:["PUM","PUZ","PUČ"], c:0, why:"Kde? -> místo."},
    {t:"Větné členy", s:"Přišel (brzy).", o:["PUM","PUZ","PUČ"], c:2, why:"Kdy? -> čas."},
    {t:"Větné členy", s:"Zpíval (krásně).", o:["PUM","PUZ","PUČ"], c:1, why:"Jak? -> způsob."},
    {t:"Větné členy", s:"Vrátíme se (v neděli).", o:["PUM","PUZ","PUČ"], c:2, why:"Kdy? -> čas."},
    {t:"Větné členy", s:"Běžel (domů).", o:["PUM","PUZ","PUČ"], c:0, why:"Kam? -> místo."},
    {t:"Větné členy", s:"Mluvil (tiše).", o:["PUM","PUZ","PUČ"], c:1, why:"Jak? -> způsob."},
    {t:"Větné členy", s:"Ležel (na zemi).", o:["PUM","PUZ","PUČ"], c:0, why:"Kde? -> místo."},
    {t:"Větné členy", s:"Cvičíme (denně).", o:["PUM","PUZ","PUČ"], c:2, why:"Kdy? -> čas."},
    {t:"Větné členy", s:"Psala (perem). Pozor!", o:["PUZ","Předmět","PUM"], c:1, why:"Čím? (7. pád) -> Předmět."},
    {t:"Větné členy", s:"Díval se (vzhůru).", o:["PUM","PUZ","PUČ"], c:0, why:"Kam? -> místo."}
];

let score = 0;
let done = 0;

function buildQuiz() {
    const box = document.getElementById('quizBox');
    Q.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = 'q-card';
        div.innerHTML = `
            <div class="q-topic">${q.t}</div>
            <div class="q-text">${i+1}. ${q.s}</div>
            <div class="options" id="optbox${i}">
                ${q.o.map((opt, oi) => `
                    <button class="opt-btn" onclick="check(${i}, ${oi}, this)">${opt}</button>
                `).join('')}
            </div>
            <div class="feedback" id="feed${i}">${q.why}</div>
        `;
        box.appendChild(div);
    });
}

function check(qi, oi, btn) {
    const isOk = oi === Q[qi].c;
    const btns = document.getElementById(`optbox${qi}`).querySelectorAll('.opt-btn');
    btns.forEach(b => b.disabled = true);

    if(isOk) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
        btns[Q[qi].c].classList.add('correct');
    }

    document.getElementById(`feed${qi}`).classList.add('show');
    done++;
    document.getElementById('progText').innerText = `Zodpovězeno: ${done} / 50`;
    document.getElementById('scoreText').innerText = `Body: ${score}`;
}

function showFinal() {
    if(done < 50) {
        alert("Ještě jsi nedokončil všech 50 otázek! Makej dál!");
        return;
    }
    const sum = document.getElementById('summary');
    sum.style.display = 'block';
    document.getElementById('finalScore').innerText = `${score} / 50`;

    let m = "";
    if(score === 50) m = "TY JSI BŮH ČEŠTINY! 🔥";
    else if(score > 40) m = "Úžasný výkon, jsi profík! 🌟";
    else if(score > 25) m = "Dobré, ale máš tam mezery. Projdi si chyby! 📖";
    else m = "Tohle chce ještě hodně tréninku. Hlavu vzhůru! 💪";
    
    document.getElementById('finalMsg').innerText = m;
    sum.scrollIntoView({behavior:'smooth'});
}

buildQuiz();
</script>
</body>
</html>
