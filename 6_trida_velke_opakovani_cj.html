<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarní Maraton Češtiny - 50 Otázek</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --spring-yellow: #fff176;
        --flower-yellow: #fdd835;
        --leaf-green: #9ccc65;
        --dark-text: #4e342e;
        --card-bg: #ffffff;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body {
        font-family: 'Montserrat', sans-serif;
        background: #fffde7 url('https://www.transparenttextures.com/patterns/natural-paper.png');
        color: var(--dark-text);
        padding: 20px;
    }
    .container { max-width: 850px; margin: 0 auto; }
    
    header {
        text-align: center;
        padding: 3rem 1rem;
        background: var(--flower-yellow);
        border-radius: 30px;
        box-shadow: 0 8px 0 #f9a825;
        margin-bottom: 2rem;
        border: 4px solid #fff;
    }
    h1 { font-weight: 900; font-size: 2.2rem; text-transform: uppercase; color: #5d4037; }
    .subtitle { font-weight: 700; color: #795548; font-size: 1.1rem; }

    .sticky-stats {
        position: sticky; top: 10px; z-index: 1000;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(5px);
        padding: 15px 25px;
        border-radius: 50px;
        border: 3px solid var(--flower-yellow);
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 2rem; font-weight: 700;
    }

    .q-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 25px;
        margin-bottom: 1.5rem;
        border: 2px solid #e0e0e0;
        position: relative;
        transition: transform 0.2s;
    }
    .q-card:hover { transform: scale(1.01); border-color: var(--flower-yellow); }
    .q-num { background: var(--flower-yellow); padding: 5px 12px; border-radius: 10px; font-weight: 900; margin-right: 10px; }
    .q-topic { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; color: var(--leaf-green); display: block; margin-bottom: 10px; }
    .q-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 1.5rem; }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    
    .opt-btn {
        background: #fffde7; border: 2px solid var(--spring-yellow);
        padding: 14px; border-radius: 12px; cursor: pointer;
        font-family: inherit; font-weight: 700; color: var(--dark-text);
        transition: all 0.2s; text-align: left;
    }
    .opt-btn:hover:not(:disabled) { background: var(--flower-yellow); transform: translateY(-2px); }
    .opt-btn.correct { background: #81c784 !important; color: white; border-color: #4caf50; }
    .opt-btn.wrong { background: #e57373 !important; color: white; border-color: #f44336; }

    .feedback {
        margin-top: 1rem; padding: 12px; border-radius: 10px;
        background: #f1f8e9; border: 1px solid var(--leaf-green);
        font-size: 0.9rem; display: none;
    }
    .feedback.show { display: block; animation: slideIn 0.3s; }

    .finish-btn {
        width: 100%; padding: 20px; border-radius: 20px;
        border: none; background: #9ccc65; color: white;
        font-size: 1.5rem; font-weight: 900; cursor: pointer;
        box-shadow: 0 6px 0 #689f38; margin: 2rem 0 5rem;
    }
    .finish-btn:hover { background: #8bc34a; }

    #summary {
        display: none; background: white; padding: 40px;
        border-radius: 30px; text-align: center; border: 6px solid var(--flower-yellow);
    }
    .big-score { font-size: 5rem; font-weight: 900; color: var(--flower-yellow); }

    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌼 Jarní Čestinářský Maraton 🌼</h1>
        <p class="subtitle">50 těžkých otázek v jarním hávu</p>
    </header>

    <div class="sticky-stats">
        <span id="progText">Vykvetlo: 0 / 50</span>
        <span id="scoreText">Úspěšnost: 0%</span>
    </div>

    <div id="quizBox"></div>

    <button class="finish-btn" onclick="showFinal()">UKÁZAT VÝSLEDKY</button>

    <div id="summary">
        <h2>Tvé jarní vysvědčení:</h2>
        <div class="big-score" id="finalScore">0/50</div>
        <p id="finalMsg" style="margin: 20px 0; font-size: 1.3rem;"></p>
        <button class="finish-btn" onclick="location.reload()">Zkusit znovu</button>
    </div>
</div>

<script>
const QUESTIONS = [
    // 1-10: Větné členy (Po, Př, PUM, PUČ, PUZ)
    {t:"Větné členy", s:"(Sněženky) už vykoukly z hlíny.", o:["Podmět","Přísudek","PUM"], c:0, why:"Sněženky jsou vykonavatelem děje -> Podmět."},
    {t:"Větné členy", s:"Slunce (hřeje) čím dál víc.", o:["Podmět","Přísudek","PUZ"], c:1, why:"Hřeje vyjadřuje činnost podmětu -> Přísudek."},
    {t:"Větné členy", s:"Vlaštovky přiletěly (z jihu).", o:["PUM","PUČ","PUZ"], c:0, why:"Odkud? Z jihu -> Příslovečné určení místa."},
    {t:"Větné členy", s:"Petr (vesele) pletl pomlázku.", o:["PUČ","PUZ","PUM"], c:1, why:"Jak? Vesele -> Příslovečné určení způsobu."},
    {t:"Větné členy", s:"(V dubnu) bývá proměnlivé počasí.", o:["PUM","PUČ","PUZ"], c:1, why:"Kdy? V dubnu -> Příslovečné určení času."},
    {t:"Větné členy", s:"Na louce (rozkvetly) petrklíče.", o:["Přísudek","Podmět","PUM"], c:0, why:"Co udělaly? Rozkvetly -> Přísudek."},
    {t:"Větné členy", s:"Zajíci běhají (po poli).", o:["PUM","PUČ","PUZ"], c:0, why:"Kde? Po poli -> Příslovečné určení místa."},
    {t:"Větné členy", s:"Babička (pomalu) sela semínka.", o:["PUZ","PUČ","PUM"], c:0, why:"Jak? Pomalu -> Příslovečné určení způsobu."},
    {t:"Větné členy", s:"(Včera) začalo jaro.", o:["PUČ","PUM","PUZ"], c:0, why:"Kdy? Včera -> Příslovečné určení času."},
    {t:"Větné členy", s:"Děti (u potoka) pouštěly lodičky.", o:["PUM","PUČ","PUZ"], c:0, why:"Kde? U potoka -> Příslovečné určení místa."},

    // 11-20: Příčestí minulé (Shoda) - HARD
    {t:"Příčestí", s:"Děti a jeňata se ___ na slunci.", o:["vyhřívali","vyhřívaly","vyhřívala"], c:2, why:"Děti (ž.) + Jeňata (stř. mn. č.) -> koncovka -a."},
    {t:"Příčestí", s:"Včely a čmeláci ___ na květy.", o:["usedali","usedaly"], c:0, why:"Čmeláci jsou muž. životní -> koncovka -i."},
    {t:"Příčestí", s:"Davy lidí ___ jarní vzduch.", o:["nasávali","nasávaly"], c:1, why:"Davy (neživ.) jsou podmětem -> koncovka -y."},
    {t:"Příčestí", s:"Mrazy konečně ___.", o:["ustoupili","ustoupily"], c:1, why:"Mrazy (neživ.) -> koncovka -y."},
    {t:"Příčestí", s:"Oči se jí ___ radostí.", o:["rozšířili","rozšířily"], c:1, why:"Párové orgány (oči, uši) mají v mn. č. vždy -y."},
    {t:"Příčestí", s:"Děvčata ___ velikonoční vajíčka.", o:["barvili","barvaly"], c:1, why:"Děvčata (ženský rod) -> koncovka -y."},
    {t:"Příčestí", s:"Ptáci ___ hnízda.", o:["stavěli","stavěly"], c:0, why:"Ptáci (muž. živ.) -> koncovka -i."},
    {t:"Příčestí", s:"Stromy na zahradě ___.", o:["rozkvetli","rozkvetly"], c:1, why:"Stromy (neživ.) -> koncovka -y."},
    {t:"Příčestí", s:"Housata se ___ v trávě.", o:["batolili","batolily","batolila"], c:2, why:"Housata (stř. mn. č.) -> koncovka -a."},
    {t:"Příčestí", s:"Rodiče ___ jarní úklid.", o:["plánovali","plánovaly"], c:0, why:"Rodiče (muž. živ.) -> koncovka -i."},

    // 21-30: Mně / Mě
    {t:"Mně/Mě", s:"Jaro ___ vždy potěší.", o:["mě","mně"], c:0, why:"4. pád (koho?) -> mě."},
    {t:"Mně/Mě", s:"Ke ___ přiletěl motýl.", o:["mě","mně"], c:1, why:"3. pád po předložce 'k' -> mně."},
    {t:"Mně/Mě", s:"Vzpomeň si na ___ při pletení.", o:["mě","mně"], c:0, why:"4. pád -> mě (tě)."},
    {t:"Mně/Mě", s:"O ___ se strýc nebál.", o:["mě","mně"], c:0, why:"4. pád -> mě."},
    {t:"Mně/Mě", s:"Pomoz ___ s tou zahrádkou.", o:["mě","mně"], c:1, why:"3. pád (komu?) -> mně (tobě)."},
    {t:"Mně/Mě", s:"Podíval se na ___.", o:["mě","mně"], c:0, why:"4. pád -> mě."},
    {t:"Mně/Mě", s:"Při ___ stálo štěstí.", o:["mě","mně"], c:1, why:"6. pád -> mně."},
    {t:"Mně/Mě", s:"Vidíš ___ v tom houští?", o:["mě","mně"], c:0, why:"4. pád -> mě."},
    {t:"Mně/Mě", s:"Bez ___ na výlet nechoďte.", o:["mě","mně"], c:0, why:"2. pád -> mě."},
    {t:"Mně/Mě", s:"V ___ se probudila naděje.", o:["mě","mně"], c:1, why:"6. pád -> mně."},

    // 31-40: Zájmena (Druhy)
    {t:"Zájmena", s:"Jaký druh: (Někdo) klepe.", o:["osobní","neurčité","vztažné"], c:1, why:"Někdo vyjadřuje neurčitost."},
    {t:"Zájmena", s:"Jaký druh: (Náš) dům.", o:["přivlastňovací","osobní","ukazovací"], c:0, why:"Náš říká, komu to patří."},
    {t:"Zájmena", s:"Jaký druh: (Jenž) zpívá.", o:["tázací","vztažné","záporné"], c:1, why:"Jenž je vztažné (spojuje věty)."},
    {t:"Zájmena", s:"Jaký druh: (Všichni) přišli.", o:["neurčité","osobní","záporné"], c:0, why:"Všichni, každý jsou neurčitá."},
    {t:"Zájmena", s:"Jaký druh: (Žádný) květ.", o:["záporné","ukazovací","neurčité"], c:0, why:"Žádný popírá existenci."},
    {t:"Zájmena", s:"Jaký druh: (Tento) narcis.", o:["ukazovací","tázací","vztažné"], c:0, why:"Tento ukazuje na věc."},
    {t:"Zájmena", s:"Jaký druh: (Kdo) to ví?", o:["tázací","vztažné","osobní"], c:0, why:"V otázce je Kdo zájmeno tázací."},
    {t:"Zájmena", s:"Jaký druh: (Sami) to víte.", o:["osobní","ukazovací","neurčité"], c:0, why:"Sám/Sami jsou osobní zájmena."},
    {t:"Zájmena", s:"Jaký druh: (Nijaký) nápad.", o:["neurčité","záporné","vztažné"], c:1, why:"Nijaký je záporné."},
    {t:"Zájmena", s:"Jaký druh: (Já) ho vidím.", o:["osobní","ukazovací","přivlastňovací"], c:0, why:"Já, ty, on... jsou osobní."},

    // 41-50: Číslovky (Druhy)
    {t:"Číslovky", s:"Druh: (Patero) mláďat.", o:["základní","druhová","řadová"], c:1, why:"Patero vyjadřuje počet druhů/souborů."},
    {t:"Číslovky", s:"Druh: (Třikrát) zahřmělo.", o:["násobná","řadová","základní"], c:0, why:"Kolikrát? -> násobná."},
    {t:"Číslovky", s:"Druh: (Druhá) neděle.", o:["základní","řadová","druhová"], c:1, why:"Kolikátá? -> řadová."},
    {t:"Číslovky", s:"Druh: (Mnoho) květů.", o:["základní neurčitá","řadová","násobná"], c:0, why:"Mnoho, několik jsou základní neurčité."},
    {t:"Číslovky", s:"Druh: (Stý) návštěvník.", o:["základní","řadová","násobná"], c:1, why:"Řadová."},
    {t:"Číslovky", s:"Druh: (Oboje) boty.", o:["základní","řadová","druhová"], c:2, why:"Druhová."},
    {t:"Číslovky", s:"Druh: (Sedm) dní.", o:["základní","řadová","násobná"], c:0, why:"Základní."},
    {t:"Číslovky", s:"Druh: (Dvakrát) měř.", o:["násobná","druhová","řadová"], c:0, why:"Násobná."},
    {t:"Číslovky", s:"Druh: (Tisíc) let.", o:["základní","řadová","druhová"], c:0, why:"Základní."},
    {t:"Číslovky", s:"Druh: (Několikátý) pokus.", o:["řadová neurčitá","druhová","násobná"], c:0, why:"Řadová neurčitá."}
];

let score = 0;
let answeredCount = 0;

function initQuiz() {
    const box = document.getElementById('quizBox');
    QUESTIONS.forEach((q, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `
            <span class="q-topic">${q.t}</span>
            <div class="q-text"><span class="q-num">${i+1}</span>${q.s}</div>
            <div class="options" id="optContainer${i}">
                ${q.o.map((opt, oi) => `<button class="opt-btn" onclick="handleSelect(${i}, ${oi}, this)">${opt}</button>`).join('')}
            </div>
            <div class="feedback" id="feed${i}">${q.why}</div>
        `;
        box.appendChild(card);
    });
}

function handleSelect(qIdx, oIdx, btn) {
    const isCorrect = oIdx === QUESTIONS[qIdx].correct;
    const container = document.getElementById(`optContainer${qIdx}`);
    const btns = container.querySelectorAll('.opt-btn');
    
    btns.forEach(b => b.disabled = true);
    
    if (isCorrect) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
        btns[QUESTIONS[qIdx].correct].classList.add('correct');
    }
    
    document.getElementById(`feed${qIdx}`).classList.add('show');
    answeredCount++;
    updateStats();
}

function updateStats() {
    document.getElementById('progText').innerText = `Vykvetlo: ${answeredCount} / 50`;
    const pct = Math.round((score / QUESTIONS.length) * 100);
    document.getElementById('scoreText').innerText = `Úspěšnost: ${pct}%`;
}

function showFinal() {
    if (answeredCount < 50) {
        alert("Zahrada ještě není celá rozkvetlá! Odpověz na všechny otázky.");
        return;
    }
    const sum = document.getElementById('summary');
    sum.style.display = 'block';
    document.getElementById('finalScore').innerText = `${score} / 50`;
    
    let msg = "";
    if (score === 50) msg = "Jsi král jarní přírody i české gramatiky! 👑🌻";
    else if (score > 40) msg = "Nádherný výsledek, tvé znalosti jen kvetou! 🌸";
    else if (score > 25) msg = "Dobré, ale pozor na jarní mrazíky v gramatice! ❄️";
    else msg = "Tohle jaro budeš muset ještě trochu zalévat učebnice. 💧📖";
    
    document.getElementById('finalMsg').innerText = msg;
    sum.scrollIntoView({behavior: 'smooth'});
}

initQuiz();
</script>
</body>
</html>
