<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronotype Discovery 🌌</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --accent: #a29bfe;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        #quiz-container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .q-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 { font-size: 1.8rem; margin-top: 0; }
        .progress { color: var(--accent); font-weight: bold; margin-bottom: 10px; }

        .question { font-size: 1.3rem; margin-bottom: 20px; min-height: 60px; }

        .options { display: grid; gap: 10px; }

        button {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        button:hover {
            background: var(--accent);
            color: #0f0c29;
            transform: scale(1.02);
        }

        #result { display: none; }
        .res-img { width: 120px; height: 120px; border-radius: 50%; margin: 20px auto; display: block; border: 3px solid var(--accent); }
        .emoji-big { font-size: 50px; display: block; margin-bottom: 10px; }
        .desc { color: #dcdde1; line-height: 1.6; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-ui">
        <div class="progress" id="progress">Loading...</div>
        <img id="main-image" class="q-image" src="https://images.unsplash.com/photo-1511295742364-911917188c97?auto=format&fit=crop&w=600&q=80" alt="Sleepy">
        <div class="question" id="question-text">Ready to find your rhythm?</div>
        <div class="options" id="options-container">
            <button onclick="startQuiz()">Begin Journey ✨</button>
        </div>
    </div>

    <div id="result">
        <span class="emoji-big" id="res-emoji"></span>
        <h2 id="res-name"></h2>
        <p class="desc" id="res-desc"></p>
        <button onclick="location.reload()" style="background: var(--accent); color: black; font-weight: bold; width: 100%;">Try Again 🔄</button>
    </div>
</div>

<script>
    const questions = [
        { q: "What's your typical 'Lights Out' time? 🕯️", img: "https://images.unsplash.com/photo-1516339901601-2e1b62dc0c45?auto=format&fit=crop&w=600&q=80", a: ["Before 10:00 PM", "10:00 PM - 12:00 AM", "After 12:00 AM", "I don't have one"], s: [0, 1, 2, 3] },
        { q: "How do you wake up? ⏰", img: "https://images.unsplash.com/photo-1495121553079-4c61bbce1894?auto=format&fit=crop&w=600&q=80", a: ["Before the alarm", "Hit snooze once", "Hit snooze 5 times", "What is sleep?"], s: [0, 1, 2, 3] },
        { q: "Your ideal breakfast time? ☕", img: "https://images.unsplash.com/photo-1493770348161-369560ae357d?auto=format&fit=crop&w=600&q=80", a: ["Right away", "Within an hour", "Much later", "Coffee is my breakfast"], s: [0, 1, 2, 3] },
        { q: "When do you feel most alert? 🧠", img: "https://images.unsplash.com/photo-1484417894907-623942c8ee29?auto=format&fit=crop&w=600&q=80", a: ["Early Morning", "Midday", "Late Night", "Short bursts"], s: [0, 1, 2, 3] },
        { q: "How's your focus at 3 PM? 📉", img: "https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&w=600&q=80", a: ["Winding down", "Steady", "Just starting!", "Exhausted"], s: [0, 1, 2, 3] },
        { q: "Evening workouts? 🏋️‍♂️", img: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=600&q=80", a: ["Too tired", "Maybe a walk", "Love them!", "I prefer the 2am gym"], s: [0, 1, 2, 3] },
        { q: "Nap preference? 😴", img: "https://images.unsplash.com/photo-1520206151081-999a71072b0f?auto=format&fit=crop&w=600&q=80", a: ["No thanks", "Power nap only", "Long naps!", "I can't nap"], s: [0, 1, 2, 3] },
        { q: "Social life kicks in at... 🥳", img: "https://images.unsplash.com/photo-1496337589254-7e19d01ced44?auto=format&fit=crop&w=600&q=80", a: ["Lunch", "Happy Hour", "Midnight", "Online only"], s: [0, 1, 2, 3] },
        { q: "How long to fall asleep? 💤", img: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=600&q=80", a: ["Seconds", "15 minutes", "An hour", "I just watch the clock"], s: [0, 1, 2, 3] },
        { q: "When are you most creative? 🎨", img: "https://images.unsplash.com/photo-1499781350541-7783f6c6a0c8?auto=format&fit=crop&w=600&q=80", a: ["Sunrise", "Daylight", "Moonlight", "When stressed"], s: [0, 1, 2, 3] }
        // Note: Shortened to 10 for demonstration; you can easily add more following this pattern!
    ];

    let current = 0;
    let scores = [0, 0, 0, 0];

    function startQuiz() {
        showQuestion();
    }

    function showQuestion() {
        const q = questions[current];
        document.getElementById("progress").innerText = `Step ${current + 1} of ${questions.length} ✨`;
        document.getElementById("main-image").src = q.img;
        document.getElementById("question-text").innerText = q.q;
        const container = document.getElementById("options-container");
        container.innerHTML = "";

        q.a.forEach((ans, i) => {
            const btn = document.createElement("button");
            btn.innerText = ans;
            btn.onclick = () => {
                scores[q.s[i]]++;
                current++;
                if(current < questions.length) showQuestion();
                else showResult();
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result").style.display = "block";
        
        const types = [
            { n: "Lion 🦁", e: "🦁", d: "You are the king of the morning! Efficient, analytical, and early to bed." },
            { n: "Bear 🐻", e: "🐻", d: "Your cycle matches the sun. You're friendly, hard-working, and value your sleep." },
            { n: "Wolf 🐺", e: "🐺", d: "The night is yours. You are creative, impulsive, and hate morning meetings." },
            { n: "Dolphin 🐬", e: "🐬", d: "The alert sleeper. Highly intelligent and energetic, but prone to restlessness." }
        ];

        const winner = scores.indexOf(Math.max(...scores));
        document.getElementById("res-emoji").innerText = types[winner].e;
        document.getElementById("res-name").innerText = types[winner].n;
        document.getElementById("res-desc").innerText = types[winner].d;
    }
</script>
</body>
</html>
